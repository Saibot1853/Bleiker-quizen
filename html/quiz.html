<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <nav>
        <ul>
            <div id="logoDiv">
                <li><a href="../index.html"><img src="../img/logo.png" alt="" id="Logo"></a></li>

    <div class="sidequiz">
        <h1>Quiz</h1>
        <div id="boks">
            <div id="innhold">
                <p id="status"></p>
                <div id="media"></div>
                <h2 id="sporsmal"></h2>
                <div id="valg"></div>
                <button id="neste">Next</button>
                <button id="start-pa-nytt">Prøv på nytt</button>
                <p id="melding"></p>

                <div id="lagring">
                    <label for="navn">Navn</label>
                    <input type="text" id="navn" placeholder="Skriv navnet ditt">
                    <button id="lagre-score">Lagre score</button>
                </div>

                <div id="toppliste">
                    <h3>Scoreboard</h3>
                    <ol id="liste"></ol>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer">
        <div class="footer-content">
            <img src="../img/logo.png" alt="Logo" class="footer-logo">
